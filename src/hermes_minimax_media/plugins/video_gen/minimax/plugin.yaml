name: minimax
version: 1.0.0
description: "MiniMax (海螺) video generation backend. Hailuo-2.3/Hailuo-02/S2V-01 support text-to-video and image-to-video via async task polling. Auto-routes to CN endpoint (api.minimaxi.com) when MINIMAX_CN_* env is set, otherwise global (api.minimax.io)."
author: NousResearch
kind: backend
requires_env: []  # works with either MINIMAX_CN_API_KEY or MINIMAX_API_KEY
